<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>KBO Weather & News</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#08111f;
  color:white;
  font-family:Arial,sans-serif;
}

/* HEADER */

.header{
  padding:20px 28px;
  background:#111827;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.header h1{
  margin:0;
}

.header p{
  margin-top:8px;
  color:#94a3b8;
}

/* LAYOUT */

.container{
  display:grid;
  grid-template-columns:45% 55%;
  gap:20px;
  padding:20px;
}

/* MAP */

.map-area{

  position:relative;

  width:100%;
  height:820px;

  border-radius:24px;

  background:#111827;

  border:
    1px solid rgba(255,255,255,.08);

  overflow:hidden;
}

/* KOREA */

.korea{

  position:absolute;

  inset:40px;

  background:white;

  opacity:.95;

  clip-path:polygon(
    42% 0%,
    60% 8%,
    72% 20%,
    70% 36%,
    80% 55%,
    74% 72%,
    64% 92%,
    48% 100%,
    30% 90%,
    20% 72%,
    16% 50%,
    22% 30%,
    32% 12%
  );
}

/* TEAM BUTTON */

.team-btn{

  position:absolute;

  transform:
    translate(-50%,-50%);

  width:62px;
  height:62px;

  border-radius:50%;

  border:none;

  font-size:14px;
  font-weight:bold;

  cursor:pointer;

  transition:.2s;

  z-index:10;

  color:white;
}

.team-btn:hover{

  transform:
    translate(-50%,-50%)
    scale(1.08);
}

.team-btn.active{

  box-shadow:
    0 0 22px
    rgba(255,255,255,.8);

  border:
    3px solid white;
}

/* TEAM COLORS */

.lg{background:#c30452;}
.kiwoom{background:#570514;}
.ssg{background:#ce0e2d;}
.kt{background:#000000;}
.hanwha{background:#ff6600;}
.samsung{background:#074ca1;}
.kia{background:#ea0029;}
.lotte{background:#041e42;}
.nc{background:#315288;}

/* RIGHT */

.card{

  background:#111827;

  border-radius:24px;

  padding:24px;

  border:
    1px solid rgba(255,255,255,.08);

  margin-bottom:20px;
}

.card-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:20px;
}

.live{

  background:#22c55e;

  color:black;

  padding:6px 12px;

  border-radius:999px;

  font-size:12px;

  font-weight:bold;
}

/* WEATHER */

.weather-grid{

  display:grid;

  grid-template-columns:
    repeat(4,1fr);

  gap:12px;
}

.weather-item{

  background:#1e293b;

  border-radius:18px;

  padding:18px;

  text-align:center;
}

/* NEWS */

.news-item{

  background:#1e293b;

  border-radius:18px;

  padding:16px;

  margin-bottom:12px;
}

.news-item a{

  color:white;

  text-decoration:none;

  font-weight:600;
}

.news-date{

  margin-top:8px;

  color:#94a3b8;

  font-size:12px;
}

/* MOBILE */

@media(max-width:1000px){

  .container{
    grid-template-columns:1fr;
  }

  .map-area{
    height:620px;
  }

  .weather-grid{
    grid-template-columns:
      repeat(2,1fr);
  }

}

</style>
</head>

<body>

<header class="header">

  <h1>⚾ KBO Weather & News</h1>

  <p>
    구단 마크를 클릭하면
    날씨와 뉴스를 확인할 수 있습니다.
  </p>

</header>

<main class="container">

  <!-- LEFT -->

  <section class="map-area">

    <div class="korea"></div>

    <button class="team-btn lg active"
      data-team="LG"
      style="top:28%; left:55%;">
      LG
    </button>

    <button class="team-btn kiwoom"
      data-team="키움"
      style="top:24%; left:48%;">
      KI
    </button>

    <button class="team-btn ssg"
      data-team="SSG"
      style="top:22%; left:38%;">
      SG
    </button>

    <button class="team-btn kt"
      data-team="KT"
      style="top:36%; left:52%;">
      KT
    </button>

    <button class="team-btn hanwha"
      data-team="한화"
      style="top:50%; left:56%;">
      HH
    </button>

    <button class="team-btn samsung"
      data-team="삼성"
      style="top:60%; left:70%;">
      SL
    </button>

    <button class="team-btn kia"
      data-team="KIA"
      style="top:70%; left:40%;">
      KIA
    </button>

    <button class="team-btn lotte"
      data-team="롯데"
      style="top:74%; left:75%;">
      LT
    </button>

    <button class="team-btn nc"
      data-team="NC"
      style="top:80%; left:64%;">
      NC
    </button>

  </section>

  <!-- RIGHT -->

  <section>

    <!-- WEATHER -->

    <div class="card">

      <div class="card-header">

        <h2 id="title">
          LG 트윈스
        </h2>

        <span class="live">
          LIVE
        </span>

      </div>

      <div id="weather"></div>

    </div>

    <!-- NEWS -->

    <div class="card">

      <div class="card-header">
        <h2>최근 뉴스</h2>
      </div>

      <div id="news"></div>

    </div>

  </section>

</main>

<script>

const teams = {

  "LG":"LG 트윈스",
  "키움":"키움 히어로즈",
  "SSG":"SSG 랜더스",
  "KT":"KT 위즈",
  "한화":"한화 이글스",
  "삼성":"삼성 라이온즈",
  "KIA":"KIA 타이거즈",
  "롯데":"롯데 자이언츠",
  "NC":"NC 다이노스"
};

/* WEATHER */

function renderWeather(team){

  let html =
    '<div class="weather-grid">';

  const icons =
    ['☀️','⛅','🌧️','☁️'];

  for(let i=0;i<4;i++){

    html += `
      <div class="weather-item">

        <div>
          ${12+i}:00
        </div>

        <div style="
          font-size:34px;
          margin:10px 0;
        ">
          ${icons[i]}
        </div>

        <div style="
          font-size:26px;
          font-weight:bold;
        ">
          ${22+i}°
        </div>

        <div style="
          margin-top:8px;
          font-size:12px;
          color:#cbd5e1;
        ">
          강수 ${10*i}%<br>
          습도 ${55+i}%
        </div>

      </div>
    `;
  }

  html += '</div>';

  document
    .getElementById('weather')
    .innerHTML = html;
}

/* NEWS */

function renderNews(team){

  let html = '';

  for(let i=1;i<=5;i++){

    html += `
      <div class="news-item">

        <a href="#">
          ${teams[team]} 관련 뉴스 ${i}
        </a>

        <div class="news-date">
          2026-05-08
        </div>

      </div>
    `;
  }

  document
    .getElementById('news')
    .innerHTML = html;
}

/* ACTIVE */

function activate(btn){

  document
    .querySelectorAll('.team-btn')
    .forEach(b=>{
      b.classList.remove('active');
    });

  btn.classList.add('active');
}

/* CLICK */

document
  .querySelectorAll('.team-btn')
  .forEach(btn=>{

    btn.addEventListener('click', ()=>{

      const team =
        btn.dataset.team;

      activate(btn);

      document
        .getElementById('title')
        .innerText =
          teams[team];

      renderWeather(team);

      renderNews(team);

    });

});

/* DEFAULT */

renderWeather('LG');
renderNews('LG');

</script>

</body>
</html>
