<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>KBO Weather & News</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#08111f;
  color:white;
  font-family:Arial,sans-serif;
}

.header{
  padding:20px 28px;
  background:#111827;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.header h1{
  margin:0;
}

.header p{
  margin-top:8px;
  color:#94a3b8;
}

/* LAYOUT */

.container{
  display:grid;
  grid-template-columns:45% 55%;
  gap:20px;
  padding:20px;
}

/* MAP */

.map-wrap{

  position:relative;

  width:100%;
  height:850px;

  background:#111827;

  border-radius:24px;

  border:
    1px solid rgba(255,255,255,.08);

  overflow:hidden;
}

/* REAL MAP */

.korea-map{

  position:absolute;

  inset:0;

  width:100%;
  height:100%;

  object-fit:contain;

  opacity:.9;

  padding:30px;
}

/* TEAM */

.team{

  position:absolute;

  width:64px;
  height:64px;

  border-radius:50%;

  border:none;

  color:white;

  font-weight:bold;

  cursor:pointer;

  transform:
    translate(-50%,-50%);

  transition:.2s;

  z-index:10;
}

.team:hover{

  transform:
    translate(-50%,-50%)
    scale(1.08);
}

.team.active{

  border:3px solid white;

  box-shadow:
    0 0 24px
    rgba(255,255,255,.8);
}

/* TEAM COLOR */

.lg{background:#c30452;}
.kiwoom{background:#570514;}
.ssg{background:#ce0e2d;}
.kt{background:#000;}
.hanwha{background:#ff6600;}
.samsung{background:#074ca1;}
.kia{background:#ea0029;}
.lotte{background:#041e42;}
.nc{background:#315288;}

/* CARD */

.card{

  background:#111827;

  border-radius:24px;

  padding:24px;

  border:
    1px solid rgba(255,255,255,.08);

  margin-bottom:20px;
}

.card-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:20px;
}

.live{

  background:#22c55e;

  color:black;

  padding:6px 12px;

  border-radius:999px;

  font-size:12px;

  font-weight:bold;
}

/* WEATHER */

.weather-grid{

  display:grid;

  grid-template-columns:
    repeat(4,1fr);

  gap:12px;
}

.weather-item{

  background:#1e293b;

  border-radius:18px;

  padding:18px;

  text-align:center;
}

/* NEWS */

.news-item{

  background:#1e293b;

  border-radius:18px;

  padding:16px;

  margin-bottom:12px;
}

.news-item a{

  color:white;

  text-decoration:none;

  font-weight:600;
}

.news-date{

  margin-top:8px;

  color:#94a3b8;

  font-size:12px;
}

/* MOBILE */

@media(max-width:1000px){

  .container{
    grid-template-columns:1fr;
  }

  .map-wrap{
    height:620px;
  }

  .weather-grid{
    grid-template-columns:
      repeat(2,1fr);
  }

}

</style>
</head>

<body>

<header class="header">

  <h1>⚾ KBO Weather & News</h1>

  <p>
    구단을 클릭하면
    실시간 날씨와 뉴스가 변경됩니다.
  </p>

</header>

<main class="container">

  <!-- LEFT -->

  <section class="map-wrap">

    <img
      class="korea-map"
      src="https://upload.wikimedia.org/wikipedia/commons/0/09/South_Korea_blank_map.svg"
    />

    <!-- TEAM -->

    <button class="team lg active"
      data-team="LG"
      style="top:28%; left:56%;">
      LG
    </button>

    <button class="team kiwoom"
      data-team="키움"
      style="top:24%; left:49%;">
      KI
    </button>

    <button class="team ssg"
      data-team="SSG"
      style="top:22%; left:40%;">
      SG
    </button>

    <button class="team kt"
      data-team="KT"
      style="top:36%; left:53%;">
      KT
    </button>

    <button class="team hanwha"
      data-team="한화"
      style="top:50%; left:57%;">
      HH
    </button>

    <button class="team samsung"
      data-team="삼성"
      style="top:60%; left:70%;">
      SL
    </button>

    <button class="team kia"
      data-team="KIA"
      style="top:70%; left:42%;">
      KIA
    </button>

    <button class="team lotte"
      data-team="롯데"
      style="top:74%; left:76%;">
      LT
    </button>

    <button class="team nc"
      data-team="NC"
      style="top:80%; left:65%;">
      NC
    </button>

  </section>

  <!-- RIGHT -->

  <section>

    <!-- WEATHER -->

    <div class="card">

      <div class="card-header">

        <h2 id="title">
          LG 트윈스
        </h2>

        <span class="live">
          LIVE
        </span>

      </div>

      <div id="weather"></div>

    </div>

    <!-- NEWS -->

    <div class="card">

      <div class="card-header">
        <h2>최근 뉴스</h2>
      </div>

      <div id="news"></div>

    </div>

  </section>

</main>

<script>

const teams = {

  LG:{
    name:"LG 트윈스",
    temp:[22,23,24,21],
    rain:[10,20,30,15],
    news:[
      "LG 선발 임찬규 호투",
      "LG 타선 집중력 상승",
      "LG 불펜 ERA 1위",
      "LG 연승 분위기",
      "LG 홈 경기 매진"
    ]
  },

  키움:{
    name:"키움 히어로즈",
    temp:[19,20,21,18],
    rain:[30,40,50,35],
    news:[
      "키움 신인 활약",
      "키움 중심타선 폭발",
      "키움 감독 인터뷰",
      "키움 홈 경기 분석",
      "키움 불펜 안정"
    ]
  },

  SSG:{
    name:"SSG 랜더스",
    temp:[21,22,20,19],
    rain:[20,10,15,25],
    news:[
      "SSG 타격 상승세",
      "SSG 외국인 활약",
      "SSG 연패 탈출",
      "SSG 홈런 선두",
      "SSG 팬 반응"
    ]
  }

};

/* WEATHER */

function renderWeather(team){

  const data = teams[team];

  const icons =
    ['☀️','⛅','🌧️','☁️'];

  let html =
    '<div class="weather-grid">';

  for(let i=0;i<4;i++){

    html += `
      <div class="weather-item">

        <div>${12+i}:00</div>

        <div style="
          font-size:34px;
          margin:10px 0;
        ">
          ${icons[i]}
        </div>

        <div style="
          font-size:26px;
          font-weight:bold;
        ">
          ${data.temp[i]}°
        </div>

        <div style="
          margin-top:8px;
          font-size:12px;
          color:#cbd5e1;
        ">
          강수 ${data.rain[i]}%
        </div>

      </div>
    `;
  }

  html += '</div>';

  document
    .getElementById('weather')
    .innerHTML = html;
}

/* NEWS */

function renderNews(team){

  const data = teams[team];

  let html = '';

  data.news.forEach(news=>{

    html += `
      <div class="news-item">

        <a href="#">
          ${news}
        </a>

        <div class="news-date">
          2026-05-08
        </div>

      </div>
    `;
  });

  document
    .getElementById('news')
    .innerHTML = html;
}

/* CLICK */

document
  .querySelectorAll('.team')
  .forEach(btn=>{

    btn.addEventListener('click', ()=>{

      document
        .querySelectorAll('.team')
        .forEach(b=>{
          b.classList.remove('active');
        });

      btn.classList.add('active');

      const team =
        btn.dataset.team;

      document
        .getElementById('title')
        .innerText =
          teams[team].name;

      renderWeather(team);
      renderNews(team);

    });

});

/* DEFAULT */

renderWeather('LG');
renderNews('LG');

</script>

</body>
</html>
