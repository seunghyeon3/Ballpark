<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBO Weather & News</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="header">
  <h1>⚾ KBO Weather & News</h1>
  <p>구단 클릭 시 실시간 날씨 및 뉴스 조회</p>
</header>

<main class="layout">

<section class="map-section">

<svg class="korea-map" viewBox="0 0 520 900">
<path fill="#ffffff"
d="M220 40 L320 70 L380 140 L370 240 L420 360 L390 500 L340 700 L260 840 L170 760 L120 620 L100 430 L130 250 L180 100 Z"/>
</svg>

<button class="team lg active" data-team="LG" style="top:28%; left:56%;">LG</button>
<button class="team kiwoom" data-team="키움" style="top:24%; left:49%;">KI</button>
<button class="team ssg" data-team="SSG" style="top:22%; left:40%;">SSG</button>

</section>

<section class="info-section">

<div class="card">
<div class="card-header">
<h2 id="teamTitle">LG 트윈스</h2>
<span class="live">LIVE</span>
</div>

<div id="weather">loading...</div>
</div>

<div class="card">
<div class="card-header">
<h2>최근 뉴스</h2>
</div>

<div id="news">loading...</div>
</div>

</section>

</main>

<script src="./app.js"></script>

</body>
</html>
